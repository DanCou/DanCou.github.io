name: Convert Changed Markdown to HTML

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Pandoc
      run: sudo apt-get update && sudo apt-get install -y pandoc

    - name: Convert all Markdown files to HTML
      run: |
        set -x
        echo "=== Current working directory ==="
        pwd
        echo "=== Finding all .md files ==="
        find . -name "*.md" -type f
        echo "=== Starting conversions ==="
        for mdfile in $(find . -name "*.md" -type f); do
          dir="$(dirname "$mdfile")"
          base="$(basename "$mdfile")"
          num="$(echo "$base" | grep -oE '^[0-9]+' || echo '')"
          if [ -n "$num" ]; then
            htmlfile="$dir/$num.html"
          else
            htmlfile="${mdfile%.md}.html"
          fi
          echo "Converting $mdfile -> $htmlfile"
          pandoc "$mdfile" -o "$htmlfile" 2>&1
          pwd
          ls -lh "$htmlfile" 2>&1 || echo "File not found: $htmlfile"
        done
        echo "=== All HTML files in repository ==="
        find . -name "*.html" -type f

    - name: Commit and push HTML files
      run: |
        echo "=== Setting up Git configuration ==="
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        echo "=== Git status before add ==="
        git status
        echo "=== Adding all files ==="
        git add . || true
        echo "=== Git status after add ==="
        git status
        echo "=== Attempting commit ==="
        git commit -m "Update HTML from modified Markdown" || echo "No changes to commit"
        echo "=== Git status after commit ==="
        git status
        echo "=== Attempting push ==="
        git push || echo "Nothing to push"
        echo "=== Workflow completed ===" || true