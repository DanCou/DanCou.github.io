name: Convert Changed Markdown to HTML

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Pandoc
      run: sudo apt-get update && sudo apt-get install -y pandoc

    - name: Convert all Markdown files to HTML
      run: |
        echo "Finding all .md files..."
        find . -name "*.md" -type f | while IFS= read -r mdfile; do
          dir="$(dirname "$mdfile")"
          base="$(basename "$mdfile")"
          num="$(echo "$base" | grep -oE '^[0-9]+')"
          if [ -n "$num" ]; then
            htmlfile="$dir/$num.html"
          else
            htmlfile="${mdfile%.md}.html"
          fi
          echo "Converting $mdfile -> $htmlfile"
          pandoc "$mdfile" -o "$htmlfile"
          if [ -f "$htmlfile" ]; then
            echo "Successfully created $htmlfile"
          else
            echo "Failed to create $htmlfile"
          fi
        done

    - name: Commit and push HTML files
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add .
        git commit -m "Update HTML from modified Markdown" || echo "No changes to commit"
        git push || echo "Nothing to push"