name: Convert Changed Markdown to HTML

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Pandoc
      run: sudo apt-get update && sudo apt-get install -y pandoc

    - name: Convert all Markdown files to HTML
      run: |
        echo "Finding all .md files..."
        find . -name "*.md" -type f | while IFS= read -r mdfile; do
          htmlfile="${mdfile%.md}.html"
          echo "Converting $mdfile -> $htmlfile"
          pandoc "$mdfile" -o "$htmlfile"
          if [ -f "$htmlfile" ]; then
            echo "Successfully created $htmlfile"
          else
            echo "Failed to create $htmlfile"
          fi
        done

    - name: Commit and push HTML files
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        echo "Checking for HTML files to add..."
        ls -la *.html || echo "No HTML files found in root"
        find . -name "*.html" -type f
        git add **/*.html *.html || true
        if git diff --cached --quiet; then
          echo "No HTML files to commit"
        else
          echo "Committing HTML files..."
          git status
          git commit -m "Update HTML from modified Markdown"
          git push
        fi