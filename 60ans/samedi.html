<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Samedi</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-samedi">
  <main class="card">
    <div class="badge-found">✅ Samedi — trouvé !</div>
    <h1>Énigme suivante 🔢</h1>
    <p class="intro">
      Bravo pour « samedi » ! Tu as trouvé le jour. Maintenant, compte les girafes cachées parmi tous ces animaux.
    </p>

    <div class="zoo" id="zoo"></div>

    <p class="tip">Va à l'URL <strong><u>https://DanCou.github.io/60ans/xxx.html</u></strong> en remplaçant <strong>xxx</strong> par la solution de l'énigme que tu viens de résoudre.</p>
    
  </main>

  <script>
    const distractors = [
      "🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯",
      "🦁","🐮","🐷","🐸","🐙","🐵","🙈","🐔","🐧","🐦",
      "🦆","🦅","🦉","🦇","🐺","🐗","🐴","🦄","🐝","🐛",
      "🦋","🐌","🐞","🐜","🦟","🦗","🕷","🦂","🐢","🦎",
      "🐍","🦕","🦖","🦑","🦐","🦞","🦀","🐡","🐠","🐟",
      "🐬","🐳","🦈","🐊","🐅","🐆","🦓","🦍","🦧","🐘",
      "🦛","🦏","🐪","🐫","🦘","🦙","🦬","🐃","🐂","🐄",
      "🐎","🐖","🐏","🐑","🦙","🐓","🦃","🦤","🦚","🦜",
      "🦢","🦩","🕊","🐇","🦝","🦨","🦡","🦫","🦦","🦥",
      "🐁","🐀","🦔","🐾","🦭","🐿","🦊","🦦"
    ];
    const GIRAFFE = "🦒";
    const TOTAL = 108;
    const GIRAFFE_COUNT = 2;

    // Build pool: 2 giraffes + 106 distractors picked randomly
    const pool = Array.from({length: GIRAFFE_COUNT}, () => GIRAFFE);
    for (let i = pool.length; i < TOTAL; i++) {
      pool.push(distractors[Math.floor(Math.random() * distractors.length)]);
    }
    // Shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    document.getElementById("zoo").textContent = pool.join(" ");
  </script>
</body>
</html>
