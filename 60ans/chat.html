<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bravo ! — Chasse au trésor</title>
  <style>
    :root {
      --bg1: #fef3c7;
      --bg2: #fde68a;
      --card: #ffffffdd;
      --text: #3f2b1d;
      --accent: #b45309;
      --soft: #ffedd5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, var(--bg1), var(--bg2));
    }

    .card {
      width: min(640px, 96vw);
      background: var(--card);
      border-radius: 24px;
      padding: 2.2rem;
      box-shadow: 0 16px 36px rgba(95, 52, 8, 0.16);
      text-align: center;
    }

    .cat {
      font-size: clamp(5rem, 18vw, 9rem);
      line-height: 1;
      animation: bounce 1.6s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }

    h1 {
      margin: 0.8rem 0 0.4rem;
      color: var(--accent);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
    }

    .subtitle {
      margin: 0 0 1.4rem;
      font-size: 1.05rem;
      line-height: 1.6;
      opacity: 0.9;
    }

    .actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      color: #9a3412;
      background: var(--soft);
      padding: 0.6rem 1rem;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(154, 52, 18, 0.2);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="cat">🐱</div>
    <h1>Bravo, tu as réussi&nbsp;!</h1>
    <p class="subtitle">
      Tu as trouvé le chat.<br/>
      On peut passer aux choses sérieuses…
    </p>
    <div class="actions">
      <a class="btn" href="quete.html">C'est parti !</a>
    </div>
  </main>
</body>
</html>
