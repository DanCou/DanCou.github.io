<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Joyeux anniversaire Cécile — 60 ans</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-index">
  <main class="card">
    <h1>Joyeux anniversaire &nbsp;! 🎉</h1>
    <p class="subtitle">C'est la cérémonie du soixantième anniversaire ✨</p>
    <p class="message">
      Voici un petit jeu de piste pour découvrir la destination surprise de ce week-end. Prends ton temps, il n'y a pas de chrono ⏳ Euh si finalement ! Si tu trouves la réponse lundi, ce sera trop tard...<br/><br/>
    </p>
    <a class="badge" href="commencer.html">Commencer</a>
  </main>

  <script>
    const colors = ["#f97316", "#f59e0b", "#ef4444", "#10b981", "#3b82f6", "#a855f7"];
    for (let i = 0; i < 120; i++) {
      const c = document.createElement("span");
      c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (4 + Math.random() * 5) + "s";
      c.style.animationDelay = (Math.random() * 4) + "s";
      c.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(c);
    }
  </script>
</body>
</html>
