<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Page introuvable</title>
  <style>
    :root {
      --bg1: #fef3c7;
      --bg2: #fde68a;
      --card: #ffffffdd;
      --text: #3f2b1d;
      --accent: #b45309;
      --soft: #ffedd5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, var(--bg1), var(--bg2));
    }

    .card {
      width: min(680px, 96vw);
      background: var(--card);
      border-radius: 24px;
      padding: 2.4rem 2rem;
      box-shadow: 0 16px 36px rgba(95, 52, 8, 0.16);
      text-align: center;
    }

    .emoji {
      font-size: clamp(4rem, 15vw, 7rem);
      line-height: 1;
      animation: wobble 2.4s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-6deg); }
      50%       { transform: rotate(6deg); }
    }

    .code {
      margin: 0.8rem 0 0.2rem;
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -2px;
      line-height: 1;
    }

    h1 {
      font-size: clamp(1.3rem, 3.5vw, 2rem);
      margin: 0.4rem 0 1rem;
      color: var(--accent);
    }

    p {
      line-height: 1.65;
      font-size: 1.02rem;
      opacity: 0.9;
      margin-bottom: 0.6rem;
    }

    .tip {
      margin: 1.2rem 0;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      font-size: 0.97rem;
      line-height: 1.6;
    }

    .actions {
      margin-top: 1.6rem;
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      color: #9a3412;
      background: var(--soft);
      padding: 0.6rem 1.1rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.97rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(154, 52, 18, 0.2);
    }

    .path {
      margin-top: 1rem;
      font-size: 0.85rem;
      opacity: 0.55;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="emoji">🗺️</div>
    <h1>Ce n'est pas la bonne réponse</h1>

    <p>Il semblerait que cette page n'existe pas. Vérifie ta réponse et son orthographe !</p>


    <div class="actions">
      <a class="btn" href="javascript:history.back()">⬅ Page précédente</a>
    </div>

    <p class="path" id="badPath"></p>
  </main>

</body>
</html>
