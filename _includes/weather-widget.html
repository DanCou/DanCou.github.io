<!-- OpenWeather Widget - Large with 8-Day Forecast -->
<link rel="stylesheet" href="//openweathermap.org/themes/openweathermap/assets/vendor/owm/css/style.min.css">
<script src="//unpkg.com/d3@7.8.5/dist/d3.min.js"></script>
<div id="openweathermap-widget-{{ include.id }}"></div>
<script type="text/javascript">
  window.myWidgetParam ? window.myWidgetParam : window.myWidgetParam = [];
  window.myWidgetParam.push({
    id: {{ include.id }},
    cityid: '{{ include.cityid }}',
    appid: '{{ include.appid }}',
    units: '{{ include.units | default: "metric" }}',
    containerid: 'openweathermap-widget-{{ include.id }}',
  });
</script>
<script async charset="utf-8" src="//openweathermap.org/themes/openweathermap/assets/vendor/owm/js/weather-widget-generator-2.0.js"></script>
